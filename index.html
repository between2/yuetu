<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属注册入口</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; margin: 0; }
        .box { background: #fff; padding: 20px; border-radius: 12px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { text-align: center; color: #333; margin-top: 0; }
        .input-group { margin-bottom: 12px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border-color 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        .captcha-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
        .captcha-row input { margin-bottom: 0; flex: 1; }
        .captcha-row img { height: 42px; width: 120px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; object-fit: contain; padding: 2px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; margin-bottom: 15px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button.secondary { background: #007bff; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        hr { border: 0; border-top: 1px dashed #ddd; margin: 20px 0; }
        #status { font-size: 12px; color: #666; text-align: center; margin-top: 10px; }
        .version-text { font-size: 11px; color: #aaa; text-align: center; margin-top: 15px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="box">
    <h3>注册账号</h3>
    <div class="input-group">
        <input type="email" id="email" placeholder="输入邮箱 (例如: xxx@xxx.com)">
    </div>
    <div class="captcha-row">
        <input type="text" id="captchaInput" placeholder="输入右侧图形验证码" style="text-transform: uppercase;">
        <img id="captchaImg" src="" onclick="refreshCaptcha()" title="点击刷新" alt="等待输入...">
    </div>
    <button class="secondary" onclick="sendEmail()" id="btnSend" disabled>请先输入正确的邮箱</button>
    <div id="status">填写邮箱后自动加载验证码</div>
    <hr>
    <div class="input-group">
        <input type="text" id="emailCode" placeholder="输入邮箱收到的6位验证码">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="设置密码 (尽量包含字母和数字)">
    </div>
    <div class="input-group">
        <input type="text" id="inviteCode" placeholder="邀请码 (必填/选填)">
    </div>
    <button onclick="doRegister()" id="btnReg">2. 提交注册</button>

    <div class="version-text">Version: v1.5.0 (终极通关版)</div>
</div>

<script>
    const MY_PROXY = "https://broken-smoke-6508.zad13.workers.dev"; 
    
    let currentVerifyToken = "";
    let tempCodeVali = "";
    let tempEmailVali = "";
    let isCaptchaLoaded = false;
    let currentSessionCookie = "";

    function generateToken() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let token = '';
        for (let i = 0; i < 32; i++) {
            token += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return token;
    }

    async function refreshCaptcha() {
        document.getElementById('status').innerText = "正在拉取验证码数据...";
        currentVerifyToken = generateToken();
        const img = document.getElementById('captchaImg');
        const targetUrl = `${MY_PROXY}/getCode?verify_token=${currentVerifyToken}&t=${new Date().getTime()}`;
        
        try {
            const res = await fetch(targetUrl);
            const cookieVal = res.headers.get("X-Yt-Cookie");
            if (cookieVal) currentSessionCookie = cookieVal;

            const base64Text = await res.text();
            if (base64Text.includes("iVBOR")) {
                img.src = "data:image/png;base64," + base64Text;
                document.getElementById('status').innerText = "验证码加载成功";
                isCaptchaLoaded = true;
            } else {
                document.getElementById('status').innerText = "返回数据异常";
            }
        } catch (e) {
            document.getElementById('status').innerText = "网络请求失败，请检查 Worker";
        }
    }

    document.getElementById('email').addEventListener('input', function() {
        const emailVal = this.value.trim();
        const btn = document.getElementById('btnSend');
        
        if (emailVal.includes('@') && emailVal.includes('.')) {
            btn.disabled = false;
            btn.innerText = "1. 获取邮件验证码";
            if (!isCaptchaLoaded) refreshCaptcha();
        } else {
            btn.disabled = true;
            btn.innerText = "请先输入正确的邮箱";
        }
    });

    async function sendEmail() {
        const email = document.getElementById('email').value.trim();
        const captchaValue = document.getElementById('captchaInput').value.trim().toUpperCase(); 
        const btn = document.getElementById('btnSend');
        
        if(!email || !captchaValue) {
            alert("请填写完整邮箱和图形验证码");
            return;
        }

        btn.disabled = true;
        btn.innerText = "发送中...";
        
        try {
            const res = await fetch(`${MY_PROXY}/send_reg_email`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Yt-Cookie': currentSessionCookie 
                },
                body: JSON.stringify({ 
                    imail: email, 
                    verify_token: currentVerifyToken,
                    verify_code: captchaValue  
                })
            });
            const result = await res.json();
            
            if(result.code === 1 && result.data) {
                alert("邮件发送成功，请前往邮箱查收！");
                document.getElementById('status').innerText = "邮件已发送";
                tempCodeVali = result.data.code_vali;
                tempEmailVali = result.data.email_vali;
            } else {
                alert("发送失败: " + (result.msg || JSON.stringify(result)));
                refreshCaptcha(); 
            }
        } catch (e) {
            alert("请求代理服务器失败");
        } finally {
            btn.disabled = false;
            btn.innerText = "1. 获取邮件验证码";
        }
    }

    async function doRegister() {
        const email = document.getElementById('email').value.trim();
        const code = document.getElementById('emailCode').value.trim();
        const password = document.getElementById('password').value.trim();
        const inviteCode = document.getElementById('inviteCode').value.trim();
        const btn = document.getElementById('btnReg');

        if(!email || !code || !password || !tempCodeVali) {
            alert("请确保已成功收到邮件验证码，并填完了所有必填项！");
            return;
        }

        btn.disabled = true;
        btn.innerText = "注册提交中...";

        // 终极修复：严格1比1复刻官方的 Payload 结构
        const payload = {
            username: email,              // 官方拿邮箱当用户名
            password: password,
            email: "",                    // 官方强行要求的一个空字段
            imail: email,
            invite: inviteCode,           // 改为 invite
            code: code,
            vali_email: tempEmailVali,    // 名字反转：email_vali -> vali_email
            vali_code: tempCodeVali       // 名字反转：code_vali -> vali_code
        };

        try {
            const res = await fetch(`${MY_PROXY}/register`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Yt-Cookie': currentSessionCookie
                },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            
            if(result.code === 1) {
                alert("🎉 恭喜你，账号注册成功！");
                document.getElementById('status').innerText = "账号注册完成";
            } else {
                alert("注册失败: " + (result.msg || JSON.stringify(result)));
            }
        } catch (e) {
            alert("提交请求失败: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "2. 提交注册";
        }
    }
</script>

</body>
</html>
